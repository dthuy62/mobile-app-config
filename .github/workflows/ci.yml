name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Validate skills
        run: python scripts/validate_skill.py
      - name: Test
        run: python -m pytest
      - name: Build dist
        run: python scripts/build_dist.py

